version: "3.8"

services:
  db:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bonucakes_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bonucakes2026_staging}
      POSTGRES_DB: ${POSTGRES_DB:-bonucakes_staging}
    volumes:
      - ${PGDATA_PATH:-/var/lib/bonucakes_staging_pgdata}:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5441:5432"

  app:
    image: bonucakes:staging
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bonucakes_user}:${POSTGRES_PASSWORD:-bonucakes2026_staging}@db:5432/${POSTGRES_DB:-bonucakes_staging}
    env_file:
      - .env
    ports:
      - "0.0.0.0:${PORT:-3019}:3000"
